<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode → GitHub Syncer — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" alt="Extension icon" />
    <div>
      <h1>LeetCode → GitHub Syncer</h1>
      <p>Settings &amp; token management</p>
    </div>
  </div>

  <!-- Card 1: GitHub token -->
  <div class="card">
    <div class="card-title">🔑 GitHub Token</div>

    <div class="field">
      <label for="field-token">
        Fine-grained Personal Access Token
        <span class="hint">— scoped to one repo, Contents: Read &amp; write</span>
      </label>
      <div class="input-row">
        <input
          type="password"
          id="field-token"
          placeholder="github_pat_…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-toggle" id="btn-reveal" title="Show / hide token" aria-label="Toggle token visibility">👁</button>
      </div>
      <div class="remember-container">
        <label for="field-remember" class="remember-label">
          <input type="checkbox" id="field-remember" checked class="remember-checkbox" />
          Remember token across browser restarts
        </label>
      </div>
    </div>

    <div class="field">
      <label for="field-expires">
        Token expiration date
        <span class="hint">— set when you generated the token; used for expiry warnings</span>
      </label>
      <input type="date" id="field-expires" />
      <div class="expiry-info" id="expiry-info"></div>
    </div>

    <div id="status-token" class="status" role="alert" aria-live="polite"></div>
  </div>

  <!-- Card 2: Repository settings -->
  <div class="card">
    <div class="card-title">📁 Repository Settings</div>

    <div class="field">
      <label for="field-repo">
        Target repository
        <span class="hint">— format: owner/repo-name</span>
      </label>
      <input
        type="text"
        id="field-repo"
        placeholder="yourname/leetcode-solutions"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="field">
      <label for="field-branch">
        Branch
        <span class="hint">— usually main or master</span>
      </label>
      <input
        type="text"
        id="field-branch"
        placeholder="main"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
  </div>

  <!-- Card 3: Bulk History Sync -->
  <div class="card">
    <div class="card-title">🚀 Bulk History Sync</div>
    
    <div class="field">
      <label for="field-sync-opt-in" class="remember-label bulk-sync-label">
        <input type="checkbox" id="field-sync-opt-in" class="remember-checkbox" />
        Sync my previous questions to GitHub (Optional)
      </label>
      <div class="hint bulk-sync-hint">
        Fetches all your past accepted submissions and uploads them to your repository in one fast bulk commit. You can run this at any time.
      </div>
    </div>

    <div class="actions bulk-sync-actions">
      <button class="btn-primary" id="btn-bulk-sync" disabled>Start Bulk Sync</button>
    </div>

    <div id="bulk-sync-progress" class="status" aria-live="polite"></div>
  </div>

  <!-- Save & Test -->
  <div class="actions">
    <button class="btn-primary" id="btn-save">Save &amp; Test Connection</button>
    <span class="saved-note" id="saved-note">✓ Saved</span>
  </div>

  <!-- Footer link -->
  <div class="footer-link-container">
    <a href="privacy_policy.html" class="footer-link">Privacy Policy</a>
  </div>

</div>
<script type="module" src="options.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode → GitHub Syncer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #21262d;
      background: #161b22;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header-text h1 { font-size: 13px; font-weight: 600; color: #e6edf3; }
    .header-text p  { font-size: 10px; color: #8b949e; margin-top: 1px; }

    /* ── Expiry warning banner ── */
    .expiry-warn {
      display: none;
      align-items: center;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
    }

    /* ── Status rows (GitHub + LeetCode) ── */
    .status-rows {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid #21262d;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    .status-row .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #30363d;
    }
    .status-row.ok   .dot { background: #3fb950; box-shadow: 0 0 4px #3fb950; }
    .status-row.warn .dot { background: #d29922; }
    .status-row.off  .dot { background: #da3633; }
    .status-row span { color: #e6edf3; }

    /* ── Body (main message) ── */
    .body {
      flex: 1;
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      min-height: 80px;
    }
    .status-icon { font-size: 26px; line-height: 1; }
    .status-text {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.6;
      max-width: 240px;
    }
    .status-text strong { color: #e6edf3; font-weight: 500; }

    /* ── Not logged in LeetCode banner ── */
    .lc-login-warn {
      display: none;
      font-size: 11px;
      color: #ff7b72;
      background: rgba(218,54,51,0.08);
      border: 1px solid rgba(218,54,51,0.2);
      border-radius: 6px;
      padding: 7px 12px;
      margin: 0 16px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #21262d;
      display: flex;
      justify-content: flex-end;
    }
    .btn-settings {
      font-size: 11px;
      color: #58a6ff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .btn-settings:hover { color: #79c0ff; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" alt="Extension icon" />
    <div class="header-text">
      <h1>LeetCode → GitHub Syncer</h1>
      <p id="header-version">v0.4.0</p>
    </div>
  </div>

  <!-- Expiry warning banner (hidden until needed) -->
  <div class="expiry-warn" id="popup-expiry-warn" role="alert"></div>

  <!-- Status rows: GitHub + LeetCode connection indicators -->
  <div class="status-rows" id="status-rows" style="display:none;">
    <div class="status-row" id="row-github">
      <div class="dot"></div>
      <span id="row-github-text">GitHub — checking…</span>
    </div>
    <div class="status-row" id="row-leetcode">
      <div class="dot"></div>
      <span id="row-leetcode-text">LeetCode — checking…</span>
    </div>
  </div>

  <!-- Not-logged-into-LeetCode warning -->
  <div class="lc-login-warn" id="lc-login-warn">
    ⚠️ Not logged into LeetCode.<br/>
    <a href="https://leetcode.com/accounts/login/" target="_blank"
       style="color:#ff7b72;text-decoration:underline;">Log in at leetcode.com</a>
    and re-open this popup.
  </div>

  <!-- Body: setup prompt or "all good" -->
  <div class="body">
    <div class="status-icon" id="popup-status-icon">⚙️</div>
    <p class="status-text" id="popup-status-text">
      <strong>Setup required.</strong><br />
      Open settings to connect your GitHub token<br />and start syncing solutions.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-settings" id="btn-open-settings">Open Settings →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

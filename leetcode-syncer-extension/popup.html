<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode → GitHub Syncer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" alt="Extension icon" />
    <div class="header-text">
      <h1>LeetCode → GitHub Syncer</h1>
      <p id="header-version">v0.8.0</p>
    </div>
  </div>

  <!-- Expiry warning banner (hidden until needed) -->
  <div class="expiry-warn" id="popup-expiry-warn" role="alert"></div>

  <!-- Status rows: GitHub + LeetCode connection indicators -->
  <div class="status-rows status-rows--hidden" id="status-rows">
    <div class="status-row" id="row-github">
      <div class="dot"></div>
      <span id="row-github-text">GitHub — checking…</span>
    </div>
    <div class="status-row" id="row-leetcode">
      <div class="dot"></div>
      <span id="row-leetcode-text">LeetCode — checking…</span>
    </div>
  </div>

  <!-- Not-logged-into-LeetCode warning -->
  <div class="lc-login-warn" id="lc-login-warn">
    ⚠️ Not logged into LeetCode.<br/>
    <a href="https://leetcode.com/accounts/login/" target="_blank">Log in at leetcode.com</a>
    and re-open this popup.
  </div>

  <!-- Body: setup prompt or "all good" -->
  <div class="body">
    <div class="status-icon" id="popup-status-icon">⚙️</div>
    <p class="status-text" id="popup-status-text">
      <strong>Setup required.</strong><br />
      Open settings to connect your GitHub token<br />and start syncing solutions.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-settings" id="btn-open-settings">Open Settings →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

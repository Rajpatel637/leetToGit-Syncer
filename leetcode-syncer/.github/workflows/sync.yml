# .github/workflows/sync.yml — Automated daily LeetCode → GitHub sync.
#
# This workflow runs sync.py on a schedule every day at midnight UTC and
# can also be triggered manually from the GitHub Actions tab at any time.
#
# Before this workflow will work, you must add the following secrets to your
# repository (Settings → Secrets and variables → Actions → New repository secret):
#
#   LEETCODE_SESSION      Your LEETCODE_SESSION browser cookie value
#   LEETCODE_CSRF_TOKEN   Your csrftoken browser cookie value
#   LEETCODE_USERNAME     Your LeetCode username
#   GITHUB_REPO           Target solutions repo in "owner/name" format
#   GITHUB_BRANCH         Target branch (e.g. "main")
#
# GITHUB_TOKEN is automatically provided by GitHub Actions — no need to add
# it as a secret manually.

name: "🧩 LeetCode Sync"

on:
  # Run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: "Sync LeetCode Solutions"
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the syncer repository
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # Step 2 — Set up Python 3.11
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3 — Install dependencies
      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      # Step 4 — Run the syncer
      - name: "🚀 Run LeetCode sync"
        run: python sync.py
        env:
          LEETCODE_SESSION:    ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          LEETCODE_USERNAME:   ${{ secrets.LEETCODE_USERNAME }}
          # GITHUB_TOKEN is automatically provided by GitHub Actions —
          # no need to add it as a secret manually.
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:         ${{ secrets.GITHUB_REPO }}
          GITHUB_BRANCH:       ${{ secrets.GITHUB_BRANCH }}
          REQUEST_DELAY:       "0.5"
          MAX_SUBMISSIONS:     "0"
